<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue Opportunity Snapshot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #F5F5F5; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    const Scorecard = () => {
      const [step, setStep] = useState('start');
      const [responses, setResponses] = useState({});
      const [contact, setContact] = useState({ name: '', email: '', whatsapp: '' });
      const [currentQ, setCurrentQ] = useState(0);
      const [phoneValid, setPhoneValid] = useState(null);
      const [phoneError, setPhoneError] = useState('');
      const [emailValid, setEmailValid] = useState(null);
      const [showSuccessModal, setShowSuccessModal] = useState(false);

    

      const questions = [
        { id: 'website_clarity', zone: 'Website', q: 'When someone lands on your website, can they understand what you do in 5 seconds?', options: [
          { text: 'Yes, very clear', score: 0 }, { text: 'Somewhat clear', score: 1 }, { text: 'Not clear', score: 2 }
        ]},
        { id: 'website_cta', zone: 'Website', q: 'Is there a clear, easy way for someone to inquire or book on your site?', options: [
          { text: 'Yes, form or CTA is obvious', score: 0 }, { text: 'It exists but is hidden', score: 1 }, { text: 'No clear way to inquire', score: 2 }
        ]},
        { id: 'followup_speed', zone: 'Follow-up', q: 'How fast do you respond to inquiries?', options: [
          { text: 'Within 1 hour', score: 0 }, { text: 'Same day (but not immediately)', score: 1 }, { text: '24+ hours or inconsistent', score: 2 }
        ]},
        { id: 'followup_system', zone: 'Follow-up', q: 'Do you have an automated follow-up system?', options: [
          { text: 'Yes, fully automated', score: 0 }, { text: 'Partially automated', score: 1 }, { text: 'No system, manual only', score: 2 }
        ]},
        { id: 'offer_clarity', zone: 'Offer', q: 'Is your pricing/offer clear upfront?', options: [
          { text: 'Yes, very clear', score: 0 }, { text: 'Somewhat', score: 1 }, { text: 'Vague or never discussed', score: 2 }
        ]},
        { id: 'offer_positioning', zone: 'Offer', q: 'Can you explain why someone should choose you?', options: [
          { text: 'Yes, clear positioning', score: 0 }, { text: 'Kind of, needs work', score: 1 }, { text: 'Not really', score: 2 }
        ]},
        { id: 'sales_process', zone: 'Sales Process', q: 'Do you have a documented sales process?', options: [
          { text: 'Yes, clear steps', score: 0 }, { text: 'Loosely defined', score: 1 }, { text: 'No process', score: 2 }
        ]},
        { id: 'sales_objections', zone: 'Sales Process', q: 'Can you list your top 3 objections?', options: [
          { text: 'Yes, and we address them', score: 0 }, { text: 'Sort of', score: 1 }, { text: 'No idea', score: 2 }
        ]},
        { id: 'conversion_rate', zone: 'Conversion', q: 'What % of inquiries become paying clients?', options: [
          { text: 'More than 50%', score: 0 }, { text: '20–50%', score: 1 }, { text: 'Less than 20%', score: 2 }
        ]},
        { id: 'messaging', zone: 'Messaging', q: 'Do you emphasize results vs. just services?', options: [
          { text: 'Yes, results-focused', score: 0 }, { text: 'Mix of both', score: 1 }, { text: 'Just services', score: 2 }
        ]},
      ];

      const validateEmail = (value) => {
        setContact({ ...contact, email: value });
        
        if (value === '') {
          setEmailValid(null);
          return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        setEmailValid(emailRegex.test(value));
      };

      const validatePhone = (value) => {
        setContact({ ...contact, whatsapp: value });
        
        if (value === '') {
          setPhoneValid(null);
          setPhoneError('');
          return;
        }

        // Strip everything except digits and a leading +
        const cleaned = value.replace(/[^\d+]/g, '');

        if (!cleaned.startsWith('+')) {
          setPhoneValid(false);
          setPhoneError('Include country code (e.g. +1, +44, +254)');
          return;
        }

        const digitsOnly = cleaned.slice(1);

        if (!/^\d+$/.test(digitsOnly)) {
          setPhoneValid(false);
          setPhoneError('Numbers only after the country code');
          return;
        }

        // E.164 international standard: 8-15 digits after the +
        if (digitsOnly.length < 8 || digitsOnly.length > 15) {
          setPhoneValid(false);
          setPhoneError('Enter a valid number with country code');
          return;
        }

        setPhoneValid(true);
        setPhoneError('');
      };

      const calculateScore = () => {
        const totalScore = Object.values(responses).reduce((a, b) => a + b, 0);
        const maxScore = questions.length * 2;
        return Math.round((1 - totalScore / maxScore) * 100);
      };

      const calculateLeaks = () => {
        const zoneScores = {};
        Object.entries(responses).forEach(([qId, score]) => {
          const q = questions.find((q) => q.id === qId);
          if (q) zoneScores[q.zone] = (zoneScores[q.zone] || 0) + score;
        });

        const impacts = {
          Website: { label: 'Lead Capture', monthly: 'KSh 15K–25K' },
          'Follow-up': { label: 'Drop-off', monthly: 'KSh 20K–40K' },
          Offer: { label: 'Deal Size', monthly: 'KSh 10K–30K' },
          'Sales Process': { label: 'Close Rate', monthly: 'KSh 25K–50K' },
          Conversion: { label: 'Lost Sales', monthly: 'KSh 20K–45K' },
          Messaging: { label: 'Positioning', monthly: 'KSh 10K–20K' },
        };

        return Object.entries(zoneScores)
          .map(([zone, score]) => ({ zone, score, severity: score >= 4 ? 'High Priority' : 'Medium Priority', impact: impacts[zone] }))
          .sort((a, b) => b.score - a.score)
          .slice(0, 3);
      };

     const submitToGoogleForms = async (name, email, phone, score) => {
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwrfyFz3cyyOMjJ0Io5ypXpfoqs57LDOIGDEWt2fWoTmgDnFAwh7kahT9ZkNnh_1tjiNg/exec';
  try {
    const response = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ name, email, phone, score }),
      headers: { 'Content-Type': 'text/plain' }
    });
    const result = await response.json();
    console.log('Submission result:', result);
  } catch (error) {
    console.error('Submission error:', error);
  }
};
    const handleAnswer = (score) => {
        setResponses({ ...responses, [questions[currentQ].id]: score });
        if (currentQ < questions.length - 1) {
          setCurrentQ(currentQ + 1);
        } else {
          setStep('loading');
          setTimeout(() => setStep('results'), 2000);
        }
      };

      const handleStart = () => {
        if (contact.name.trim() && emailValid === true && phoneValid === true) {
          setCurrentQ(0);
          setResponses({});
          setStep('questions');
        }
      };

      const handleHybridAction = async () => {
        const score = calculateScore();
        
        // 1. Submit to Google Forms (silently)
       submitToGoogleForms(
    contact.name,
    contact.email,
    contact.whatsapp,
    score
);
        
        // 2. Download PDF
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        const pageWidth = 210;
        const leaks = calculateLeaks();
        const healthLabel = score >= 80 ? 'Healthy' : score >= 60 ? 'Needs Attention' : 'Critical';
        const todayStr = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

        // Header band
        pdf.setFillColor(196, 30, 58);
        pdf.rect(0, 0, pageWidth, 42, 'F');
        pdf.setTextColor(255, 255, 255);
        pdf.setFontSize(22);
        pdf.setFont('helvetica', 'bold');
        pdf.text('Revenue Opportunity Report', pageWidth / 2, 17, { align: 'center' });
        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(11);
        pdf.text(`Prepared for ${contact.name}`, pageWidth / 2, 26, { align: 'center' });
        pdf.setFontSize(9);
        pdf.setTextColor(255, 225, 225);
        pdf.text(todayStr, pageWidth / 2, 33, { align: 'center' });

        // Score summary card
        pdf.setDrawColor(225, 225, 225);
        pdf.setFillColor(249, 249, 249);
        pdf.roundedRect(15, 52, pageWidth - 30, 28, 3, 3, 'FD');
        pdf.setTextColor(0, 0, 0);
        pdf.setFontSize(26);
        pdf.setFont('helvetica', 'bold');
        pdf.text(`${score}/100`, 24, 70);
        pdf.setFontSize(11);
        pdf.setFont('helvetica', 'normal');
        pdf.setTextColor(110, 110, 110);
        pdf.text(`Revenue Health: ${healthLabel}`, 24, 76);

        // Priority areas section
        let yPos = 96;
        pdf.setTextColor(196, 30, 58);
        pdf.setFontSize(12);
        pdf.setFont('helvetica', 'bold');
        pdf.text('TOP PRIORITY AREAS', 15, yPos);
        pdf.setDrawColor(196, 30, 58);
        pdf.setLineWidth(0.6);
        pdf.line(15, yPos + 2, 58, yPos + 2);
        yPos += 12;

        leaks.forEach((leak, i) => {
          pdf.setDrawColor(230, 230, 230);
          pdf.setFillColor(249, 249, 249);
          pdf.roundedRect(15, yPos - 6, pageWidth - 30, 24, 2, 2, 'FD');

          pdf.setTextColor(196, 30, 58);
          pdf.setFontSize(8.5);
          pdf.setFont('helvetica', 'bold');
          pdf.text(`${i + 1}. ${leak.severity.toUpperCase()}`, 21, yPos);

          pdf.setTextColor(0, 0, 0);
          pdf.setFontSize(12);
          pdf.text(leak.zone, 21, yPos + 7);

          pdf.setTextColor(130, 130, 130);
          pdf.setFontSize(9);
          pdf.setFont('helvetica', 'normal');
          pdf.text(`Potential impact: ${leak.impact.monthly}/month`, 21, yPos + 13);

          yPos += 30;
        });

        // Recommendations section
        yPos += 4;
        pdf.setTextColor(196, 30, 58);
        pdf.setFontSize(12);
        pdf.setFont('helvetica', 'bold');
        pdf.text('RECOMMENDATIONS', 15, yPos);
        pdf.setDrawColor(196, 30, 58);
        pdf.line(15, yPos + 2, 58, yPos + 2);
        yPos += 12;

        pdf.setTextColor(60, 60, 60);
        pdf.setFontSize(10);
        pdf.setFont('helvetica', 'normal');
        [
          'Website and offer clarity review',
          'Follow-up system optimization',
          'Sales process documentation',
          'Messaging alignment'
        ].forEach((rec) => {
          pdf.text(`•  ${rec}`, 21, yPos);
          yPos += 8;
        });

        // Footer
        pdf.setDrawColor(230, 230, 230);
        pdf.setLineWidth(0.3);
        pdf.line(15, 278, pageWidth - 15, 278);
        pdf.setFontSize(8);
        pdf.setTextColor(150, 150, 150);
        pdf.setFont('helvetica', 'normal');
        pdf.text('NEO B2B Revenue Systems  •  Revenue Leak Diagnostics', pageWidth / 2, 284, { align: 'center' });
        pdf.text('This is an educational screening, not a substitute for a full audit.', pageWidth / 2, 289, { align: 'center' });

        pdf.save(`Revenue-Report-${contact.name.replace(/\s+/g, '-')}.pdf`);
        
        // 3. Show success modal
        setShowSuccessModal(true);
        setTimeout(() => setShowSuccessModal(false), 4000);
        
        // 4. Open WhatsApp in new tab after slight delay
        setTimeout(() => {
          const message = `Hi Neo, I completed the Revenue Opportunity Snapshot (Score: ${score}/100). I'd like to discuss this further.`;
          const encoded = encodeURIComponent(message);
         window.open(`https://wa.me/254112591988?text=${encoded}`, '_blank');
        }, 500);
      };

      const score = calculateScore();
      const leaks = calculateLeaks();
      const health = score >= 80 ? 'Healthy' : score >= 60 ? 'Needs Attention' : 'Critical';
      const isFormValid = contact.name.trim() && emailValid === true && phoneValid === true;

      return (
        <div style={{ minHeight: '100vh', background: '#F5F5F5', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px', animation: 'fadeIn 0.3s ease' }}>
          {step === 'start' && (
            <div style={{ background: 'white', borderRadius: '24px', boxShadow: '0 8px 32px rgba(0,0,0,0.08)', maxWidth: '680px', width: '100%', padding: '60px 48px' }}>
              <div style={{ textAlign: 'center', marginBottom: '48px' }}>
                <div style={{ fontSize: '13px', fontWeight: '800', color: '#C41E3A', textTransform: 'uppercase', letterSpacing: '1.2px', marginBottom: '16px' }}>Revenue Opportunity Snapshot</div>
                <h1 style={{ fontSize: '52px', fontWeight: '800', color: '#000', margin: '0 0 16px 0', lineHeight: 1.1 }}>Find what's costing you revenue</h1>
                <p style={{ fontSize: '17px', color: '#666', margin: '0', lineHeight: 1.6 }}>3-minute diagnostic to uncover hidden growth gaps.</p>
              </div>
              <div>
                <label style={{ fontSize: '13px', fontWeight: '600', color: '#000', display: 'block', marginBottom: '8px', marginTop: '24px' }}>Full Name</label>
                <input type="text" placeholder="e.g. John Mwangi" value={contact.name} onChange={(e) => setContact({ ...contact, name: e.target.value })} style={{ width: '100%', padding: '12px 14px', fontSize: '15px', border: '1px solid #DDD', borderRadius: '10px', fontFamily: 'inherit', marginBottom: '24px' }} />
                
                <label style={{ fontSize: '13px', fontWeight: '600', color: '#000', display: 'block', marginBottom: '8px' }}>Email Address</label>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '24px' }}>
                  <input 
                    type="email" 
                    placeholder="you@example.com" 
                    value={contact.email} 
                    onChange={(e) => validateEmail(e.target.value)} 
                    style={{ 
                      flex: 1, 
                      padding: '12px 14px', 
                      fontSize: '15px', 
                      border: emailValid === false ? '2px solid #C41E3A' : emailValid === true ? '2px solid #22C55E' : '1px solid #DDD', 
                      borderRadius: '10px', 
                      fontFamily: 'inherit',
                      outline: 'none'
                    }} 
                  />
                  {emailValid === true && <span style={{ fontSize: '18px', color: '#22C55E', fontWeight: 'bold' }}>✓</span>}
                  {emailValid === false && <span style={{ fontSize: '18px', color: '#C41E3A' }}>✗</span>}
                </div>
                
                <label style={{ fontSize: '13px', fontWeight: '600', color: '#000', display: 'block', marginBottom: '8px' }}>WhatsApp Number</label>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <input 
                    type="tel" 
                    placeholder="+1 234 567 8900" 
                    value={contact.whatsapp} 
                    onChange={(e) => validatePhone(e.target.value)} 
                    style={{ 
                      flex: 1, 
                      padding: '12px 14px', 
                      fontSize: '15px', 
                      border: phoneValid === false ? '2px solid #C41E3A' : phoneValid === true ? '2px solid #22C55E' : '1px solid #DDD', 
                      borderRadius: '10px', 
                      fontFamily: 'inherit',
                      outline: 'none'
                    }} 
                  />
                  {phoneValid === true && <span style={{ fontSize: '18px', color: '#22C55E', fontWeight: 'bold' }}>✓</span>}
                  {phoneValid === false && <span style={{ fontSize: '18px', color: '#C41E3A' }}>✗</span>}
                </div>
                
                {phoneError && (
                  <p style={{ fontSize: '12px', color: '#C41E3A', fontWeight: '600', margin: '6px 0 0 0' }}>{phoneError}</p>
                )}
                
                <p style={{ fontSize: '12px', color: '#999', margin: '10px 0 0 0', lineHeight: 1.5 }}>
                  We'll contact you on this number to deliver your scorecard and discuss your assessment.
                </p>

                <button 
                  onClick={handleStart} 
                  disabled={!isFormValid} 
                  style={{ 
                    width: '100%', 
                    padding: '14px', 
                    marginTop: '28px', 
                    fontSize: '15px', 
                    fontWeight: '700', 
                    color: 'white', 
                    background: isFormValid ? '#C41E3A' : '#CCC', 
                    border: 'none', 
                    borderRadius: '10px', 
                    cursor: isFormValid ? 'pointer' : 'not-allowed', 
                    transition: 'background 0.2s' 
                  }}>
                  Start Diagnostic
                </button>
              </div>
            </div>
          )}

          {step === 'questions' && (
            <div style={{ background: 'white', borderRadius: '24px', boxShadow: '0 8px 32px rgba(0,0,0,0.08)', maxWidth: '680px', width: '100%', padding: '48px', animation: 'slideUp 0.3s ease' }}>
              <div style={{ height: '2px', background: '#EEE', borderRadius: '1px', marginBottom: '48px', overflow: 'hidden' }}>
                <div style={{ height: '100%', background: '#C41E3A', width: `${((currentQ + 1) / questions.length) * 100}%`, transition: 'width 0.3s' }} />
              </div>
              <h2 style={{ fontSize: '22px', fontWeight: '700', color: '#000', margin: '0 0 32px 0', lineHeight: 1.3 }}>{questions[currentQ].q}</h2>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                {questions[currentQ].options.map((opt, i) => (
                  <button key={i} onClick={() => handleAnswer(opt.score)} style={{ padding: '14px 16px', fontSize: '15px', textAlign: 'left', background: '#F9F9F9', border: '1px solid #E0E0E0', borderRadius: '10px', cursor: 'pointer', fontWeight: '500', color: '#333', fontFamily: 'inherit', transition: 'all 0.2s' }} onMouseEnter={(e) => { e.target.style.background = '#F0F0F0'; e.target.style.borderColor = '#C41E3A'; }} onMouseLeave={(e) => { e.target.style.background = '#F9F9F9'; e.target.style.borderColor = '#E0E0E0'; }}>
                    {opt.text}
                  </button>
                ))}
              </div>
            </div>
          )}

          {step === 'loading' && (
            <div style={{ background: 'white', borderRadius: '24px', boxShadow: '0 8px 32px rgba(0,0,0,0.08)', maxWidth: '680px', width: '100%', padding: '80px 48px', textAlign: 'center' }}>
              <h2 style={{ fontSize: '24px', fontWeight: '700', color: '#000', margin: '0 0 48px 0' }}>Analyzing your responses...</h2>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '16px', marginBottom: '48px' }}>
                {['Website', 'Sales Process', 'Follow-up', 'Messaging'].map((item, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '12px', animation: `fadeIn 0.3s ease ${i * 0.2}s forwards`, opacity: 0 }}>
                    <span style={{ fontSize: '18px' }}>✓</span>
                    <span style={{ fontSize: '15px', fontWeight: '500', color: '#333' }}>{item}</span>
                  </div>
                ))}
              </div>
              <div style={{ animation: 'pulse 1.5s infinite' }}>
                <p style={{ fontSize: '13px', color: '#999', margin: 0 }}>Generating your report...</p>
              </div>
            </div>
          )}

          {step === 'results' && (
            <div style={{ background: 'white', borderRadius: '24px', boxShadow: '0 8px 32px rgba(0,0,0,0.08)', maxWidth: '720px', width: '100%', padding: '60px 48px', animation: 'slideUp 0.4s ease', position: 'relative' }}>
              {showSuccessModal && (
                <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
                  <div style={{ background: 'white', borderRadius: '20px', padding: '48px', textAlign: 'center', maxWidth: '400px', animation: 'slideDown 0.3s ease', boxShadow: '0 20px 60px rgba(0,0,0,0.2)' }}>
                    <div style={{ fontSize: '48px', marginBottom: '16px' }}>✓</div>
                    <h3 style={{ fontSize: '20px', fontWeight: '700', color: '#000', margin: '0 0 8px 0' }}>Got your report!</h3>
                    <p style={{ fontSize: '14px', color: '#666', margin: '0 0 16px 0', lineHeight: 1.5 }}>Your PDF is downloading. WhatsApp opened in a new tab — book your assessment there.</p>
                    <button onClick={() => setShowSuccessModal(false)} style={{ padding: '10px 20px', fontSize: '14px', fontWeight: '600', background: '#C41E3A', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer' }}>
                      Got it
                    </button>
                  </div>
                </div>
              )}

              <div style={{ textAlign: 'center', marginBottom: '48px' }}>
                <div style={{ fontSize: '13px', fontWeight: '800', color: '#C41E3A', textTransform: 'uppercase', letterSpacing: '1.2px', marginBottom: '20px' }}>Your Results</div>
                <h1 style={{ fontSize: '48px', fontWeight: '800', color: '#000', margin: '0 0 32px 0' }}>{score}/100</h1>
                <div style={{ fontSize: '16px', fontWeight: '600', color: health === 'Healthy' ? '#22C55E' : health === 'Needs Attention' ? '#F59E0B' : '#C41E3A', marginBottom: '20px' }}>
                  {health === 'Healthy' ? '✓ Revenue Health: Healthy' : health === 'Needs Attention' ? '⚠ Revenue Health: Needs Attention' : '✗ Revenue Health: Critical'}
                </div>
                <p style={{ fontSize: '15px', color: '#666', margin: 0 }}>Based on your diagnostic responses</p>
              </div>

              <div style={{ marginBottom: '40px' }}>
                <h3 style={{ fontSize: '12px', fontWeight: '800', color: '#000', textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: '20px' }}>Priority Areas</h3>
                {leaks.map((leak, i) => (
                  <div key={i} style={{ background: '#F9F9F9', border: '1px solid #E8E8E8', borderRadius: '12px', padding: '20px', marginBottom: '12px', borderLeft: '3px solid #C41E3A' }}>
                    <div style={{ fontSize: '12px', fontWeight: '700', color: '#C41E3A', textTransform: 'uppercase', marginBottom: '8px' }}>{i + 1}. {leak.severity}</div>
                    <h4 style={{ fontSize: '16px', fontWeight: '700', color: '#000', margin: '0 0 8px 0' }}>{leak.zone}</h4>
                    <p style={{ fontSize: '14px', color: '#666', margin: '0 0 10px 0', lineHeight: 1.5 }}>
                      {leak.zone === 'Website' && 'Prospects struggle to understand your offer or contact you.'}
                      {leak.zone === 'Follow-up' && 'Inquiries go cold due to manual or inconsistent follow-up.'}
                      {leak.zone === 'Offer' && 'Pricing or positioning unclear, reducing conversions.'}
                      {leak.zone === 'Sales Process' && 'Friction between interest and closed sales.'}
                      {leak.zone === 'Conversion' && 'Prospects drop off before taking action.'}
                      {leak.zone === 'Messaging' && 'Marketing focuses on services, not outcomes.'}
                    </p>
                    <div style={{ fontSize: '12px', color: '#999', fontWeight: '600' }}>
                      Potential impact: <span style={{ color: '#C41E3A' }}>{leak.impact.monthly}/month</span>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ background: '#F9F9F9', border: '1px solid #E8E8E8', borderRadius: '12px', padding: '24px', marginBottom: '40px' }}>
                <div style={{ fontSize: '12px', fontWeight: '800', color: '#000', textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: '12px' }}>Recommendations</div>
                <div style={{ fontSize: '14px', color: '#333', lineHeight: 1.8 }}>
                  <div>✓ Website and offer clarity review</div>
                  <div>✓ Follow-up system optimization</div>
                  <div>✓ Sales process documentation</div>
                  <div>✓ Messaging alignment</div>
                </div>
              </div>

              <button 
                onClick={handleHybridAction} 
                style={{ 
                  width: '100%', 
                  padding: '16px', 
                  fontSize: '15px', 
                  fontWeight: '700', 
                  color: 'white', 
                  background: '#C41E3A', 
                  border: 'none', 
                  borderRadius: '10px', 
                  cursor: 'pointer', 
                  marginBottom: '18px',
                  transition: 'background 0.2s'
                }}
                onMouseEnter={(e) => e.target.style.background = '#A01529'}
                onMouseLeave={(e) => e.target.style.background = '#C41E3A'}
              >
                📥 Get this Report(pdf) + Book an Assessment
              </button>

              <p style={{ fontSize: '12px', color: '#999', textAlign: 'center', margin: '0' }}>This is Educational screening not a substitute for a full audit.</p>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Scorecard />);
  </script>
</body>
</html>
